<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAOBA MX – Mueblería Mexicana</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌳</text></svg>">
  <style>
:root{--p:#3D1C08;--s:#7B3310;--a:#C4622D;--g:#C9963F;--cream:#F8F0E3;--sand:#EDE0CC;--w:#fff;--dark:#2C1810;--gray:#8B7355;--lg:#F5EDE0;--green:#2d7a2d;--red:#c0392b;--blue:#1565c0;--r:8px;--shadow:0 4px 20px rgba(61,28,8,.12)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#FAF5EE;color:var(--dark);min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
img{max-width:100%}
ul{list-style:none}
main{flex:1}
h1{font-size:clamp(1.8rem,4vw,2.8rem)}
h2{font-size:clamp(1.3rem,3vw,1.9rem)}
h3{font-size:1.2rem}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{width:44px;height:44px}
.logo-text{line-height:1}
.logo-brand{display:block;font-size:1.35rem;font-weight:800;letter-spacing:.07em;color:var(--p)}
.logo-sub{display:block;font-size:.52rem;letter-spacing:.28em;color:var(--a);text-transform:uppercase;margin-top:2px}
#site-header{background:var(--w);border-bottom:1px solid var(--sand);position:sticky;top:0;z-index:200}
.header-inner{max-width:1280px;margin:0 auto;height:68px;padding:0 1.5rem;display:flex;align-items:center;gap:1.5rem}
.nav-links{display:flex;gap:1.4rem;margin-left:auto}
.nav-links a{font-size:.88rem;color:var(--dark);font-weight:500;cursor:pointer;transition:color .2s;padding:.3rem 0;border-bottom:2px solid transparent}
.nav-links a:hover,.nav-links a.active{color:var(--a);border-bottom-color:var(--a)}
.header-actions{display:flex;align-items:center;gap:.7rem;margin-left:1rem}
.icon-btn{background:none;border:none;font-size:1.25rem;color:var(--p);position:relative;padding:.3rem;border-radius:50%;transition:background .2s}
.icon-btn:hover{background:var(--lg)}
.cart-badge{position:absolute;top:-4px;right:-4px;background:var(--a);color:#fff;border-radius:50%;width:18px;height:18px;font-size:.62rem;display:flex;align-items:center;justify-content:center;font-weight:700;pointer-events:none}
.header-search{display:flex;align-items:center;background:var(--lg);border-radius:24px;padding:.35rem .8rem;gap:.4rem;flex:1;max-width:360px}
.header-search input{border:none;background:transparent;font-size:.88rem;color:var(--dark);outline:none;flex:1}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;border:none;border-radius:var(--r);font-weight:600;font-size:.88rem;cursor:pointer;transition:all .2s;padding:.6rem 1.3rem}
.btn-primary{background:var(--a);color:#fff}
.btn-primary:hover{background:var(--s)}
.btn-secondary{background:var(--p);color:#fff}
.btn-secondary:hover{background:#2a1205}
.btn-outline{background:transparent;color:var(--a);border:2px solid var(--a)}
.btn-outline:hover{background:var(--a);color:#fff}
.btn-ghost{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.6)}
.btn-ghost:hover{background:rgba(255,255,255,.15)}
.btn-white{background:#fff;color:var(--p)}
.btn-white:hover{background:var(--cream)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{background:#a93226}
.btn-sm{padding:.4rem .9rem;font-size:.8rem}
.btn-lg{padding:.85rem 2rem;font-size:1rem}
.btn-full{width:100%}
.btn:disabled{opacity:.55;cursor:not-allowed}
.form-group{display:flex;flex-direction:column;gap:.35rem;margin-bottom:1rem}
.form-group label{font-size:.82rem;font-weight:600;color:var(--dark)}
.form-group input,.form-group select,.form-group textarea{padding:.6rem .9rem;border:1.5px solid var(--sand);border-radius:var(--r);font-size:.9rem;color:var(--dark);outline:none;background:#fff;transition:border-color .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--a)}
.form-group.error input,.form-group.error select{border-color:var(--red)}
.form-error{font-size:.78rem;color:var(--red);margin-top:.25rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-row.col-3{grid-template-columns:1fr 1fr 1fr}
.form-full{grid-column:1/-1}
.card{background:var(--w);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(61,28,8,.18)}
.card-img{height:200px;background:var(--sand);display:flex;align-items:center;justify-content:center;font-size:4rem;position:relative}
.card-badge{position:absolute;top:10px;left:10px;background:var(--a);color:#fff;font-size:.7rem;font-weight:700;padding:.2rem .6rem;border-radius:20px;letter-spacing:.04em}
.card-badge.gold{background:var(--g)}
.card-badge.dark{background:var(--p)}
.card-body{padding:1rem}
.card-title{font-weight:700;color:var(--dark);margin-bottom:.4rem;font-size:.92rem;line-height:1.3}
.card-price{color:var(--a);font-weight:800;font-size:1.1rem}
.card-price-old{color:var(--gray);text-decoration:line-through;font-size:.8rem;margin-left:.4rem}
.card-rating{color:var(--g);font-size:.82rem;margin:.3rem 0}
.card-actions{display:flex;gap:.5rem;margin-top:.8rem}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:1.5rem}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem}
.section{padding:3.5rem 1.5rem}
.section-light{background:var(--w)}
.container{max-width:1280px;margin:0 auto}
.section-title{font-size:1.8rem;font-weight:800;color:var(--p);margin-bottom:.3rem}
.section-sub{color:var(--gray);font-size:.95rem;margin-bottom:1.8rem}
.underline{width:56px;height:4px;background:var(--a);border-radius:2px;margin-bottom:.5rem}
.breadcrumb{font-size:.82rem;color:var(--gray);margin-bottom:1.2rem}
.breadcrumb span{color:var(--a);font-weight:600}
.hero{background:linear-gradient(135deg,var(--p) 0%,var(--s) 55%,var(--a) 100%);min-height:480px;padding:4rem 1.5rem;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;right:-120px;top:-120px;width:600px;height:600px;background:rgba(255,255,255,.03);border-radius:50%}
.hero-content{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center;position:relative;z-index:1}
.hero-text h1{color:#fff;font-weight:800;line-height:1.15;margin-bottom:1rem}
.hero-text p{color:rgba(255,255,255,.82);font-size:1rem;margin-bottom:1.8rem;line-height:1.65}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap}
.hero-visual{background:rgba(255,255,255,.07);border-radius:16px;height:320px;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.14);flex-direction:column;gap:.5rem;color:rgba(255,255,255,.45);font-size:.85rem}
.hero-visual .big-emoji{font-size:5.5rem}
.cat-card{background:var(--w);border-radius:12px;padding:1.5rem 1rem;text-align:center;cursor:pointer;box-shadow:var(--shadow);transition:all .2s;border:2px solid transparent}
.cat-card:hover{border-color:var(--a);transform:translateY(-3px)}
.cat-icon{font-size:2.5rem;margin-bottom:.5rem}
.cat-name{font-size:.84rem;font-weight:700;color:var(--dark)}
.promo-banner{background:linear-gradient(90deg,var(--g),#a07318);border-radius:16px;padding:2.5rem 2rem;display:flex;align-items:center;justify-content:space-between;color:#fff;flex-wrap:wrap;gap:1.5rem}
.promo-banner h2{font-size:1.8rem;font-weight:800}
.promo-big{font-size:3rem;font-weight:900}
.catalog-layout{display:grid;grid-template-columns:252px 1fr;gap:2rem;align-items:start}
.sidebar{background:var(--w);border-radius:var(--r);padding:1.4rem;box-shadow:var(--shadow);position:sticky;top:80px}
.sidebar h3{font-size:1rem;font-weight:700;color:var(--p);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:2px solid var(--sand)}
.filter-section{margin-bottom:1.2rem}
.filter-section h4{font-size:.82rem;font-weight:700;color:var(--dark);margin-bottom:.5rem}
.filter-item{display:flex;align-items:center;gap:.5rem;font-size:.82rem;color:var(--gray);margin-bottom:.35rem;cursor:pointer}
.filter-item input[type=checkbox]{accent-color:var(--a);cursor:pointer}
.filter-item:hover{color:var(--a)}
.price-range{display:flex;gap:.4rem;align-items:center}
.price-range input{flex:1;padding:.4rem .6rem;border:1.5px solid var(--sand);border-radius:6px;font-size:.8rem}
.sort-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;flex-wrap:wrap;gap:.5rem}
.sort-bar span{font-size:.85rem;color:var(--gray)}
.sort-bar select{padding:.38rem .7rem;border:1.5px solid var(--sand);border-radius:6px;font-size:.85rem;color:var(--dark)}
.search-bar{display:flex;gap:.5rem;margin-bottom:1.5rem}
.search-bar input{flex:1;padding:.55rem 1rem;border:1.5px solid var(--sand);border-radius:var(--r);font-size:.9rem;outline:none}
.search-bar input:focus{border-color:var(--a)}
.search-bar button{background:var(--a);color:#fff;border:none;border-radius:var(--r);padding:.55rem 1rem;font-size:1rem}
.detail-layout{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start}
.gallery-main{background:var(--sand);border-radius:14px;height:380px;display:flex;align-items:center;justify-content:center;font-size:8rem;margin-bottom:.8rem}
.gallery-thumbs{display:flex;gap:.5rem}
.thumb{background:var(--sand);border-radius:8px;width:74px;height:74px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;cursor:pointer;border:2px solid transparent;transition:border-color .2s}
.thumb.active{border-color:var(--a)}
.product-title{font-size:1.7rem;font-weight:800;color:var(--p);margin-bottom:.4rem}
.product-stars{color:var(--g);font-size:1rem;margin-bottom:.5rem}
.product-stars span{color:var(--gray);font-size:.82rem}
.price-big{font-size:2rem;font-weight:800;color:var(--a)}
.price-old{color:var(--gray);text-decoration:line-through;font-size:1rem;margin-left:.4rem}
.availability{display:inline-flex;align-items:center;gap:.4rem;font-size:.85rem;color:var(--green);background:#e8f5e8;padding:.3rem .8rem;border-radius:20px;margin:.8rem 0}
.availability.out{color:var(--red);background:#ffeaea}
.qty-row{display:flex;align-items:center;gap:.8rem;margin-bottom:1rem}
.qty-row label{font-size:.9rem;font-weight:600}
.qty-btn{width:36px;height:36px;border:1.5px solid var(--sand);border-radius:8px;background:var(--w);font-size:1.2rem;color:var(--dark)}
.qty-btn:hover{border-color:var(--a);color:var(--a)}
.qty-val{font-weight:700;font-size:1.1rem;min-width:32px;text-align:center}
.add-cart-btn{width:100%;padding:.85rem;background:var(--a);color:#fff;border:none;border-radius:var(--r);font-size:1rem;font-weight:700;margin-bottom:.7rem}
.add-cart-btn:hover{background:var(--s)}
.wishlist-btn{width:100%;padding:.7rem;background:transparent;color:var(--a);border:2px solid var(--a);border-radius:var(--r);font-size:.9rem;font-weight:600}
.wishlist-btn:hover{background:var(--a);color:#fff}
.product-tabs{border-bottom:2px solid var(--sand);margin-top:1.5rem}
.tab-btn{padding:.6rem 1.2rem;cursor:pointer;font-weight:600;font-size:.9rem;color:var(--gray);background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab-btn.active{color:var(--a);border-bottom-color:var(--a)}
.tab-content{padding:1.2rem 0;font-size:.9rem;color:var(--gray);line-height:1.7}
.tab-content.hidden{display:none}
.spec-table{width:100%;font-size:.85rem;border-collapse:collapse}
.spec-table td{padding:.4rem .2rem;border-bottom:1px solid var(--sand)}
.spec-table td:first-child{font-weight:600;color:var(--dark);width:40%}
.review-card{background:var(--lg);border-radius:var(--r);padding:1rem;margin-bottom:.8rem}
.review-author{font-weight:700;font-size:.88rem;color:var(--dark)}
.review-date{font-size:.75rem;color:var(--gray)}
.review-text{font-size:.85rem;color:var(--gray);margin-top:.4rem;line-height:1.5}
.review-form{background:var(--lg);border-radius:var(--r);padding:1.2rem;margin-top:1rem}
.star-input{display:flex;gap:.2rem;font-size:1.5rem;margin-bottom:.8rem}
.star-input span{cursor:pointer;color:var(--sand);transition:color .15s}
.star-input span.active{color:var(--g)}
.cart-layout{display:grid;grid-template-columns:1fr 340px;gap:2rem;align-items:start}
.cart-item{background:var(--w);border-radius:var(--r);padding:1.2rem;margin-bottom:1rem;display:flex;gap:1.2rem;align-items:center;box-shadow:var(--shadow)}
.cart-item-img{background:var(--sand);border-radius:8px;width:88px;height:88px;display:flex;align-items:center;justify-content:center;font-size:2.4rem;flex-shrink:0}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-weight:700;color:var(--dark);font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-sub{font-size:.8rem;color:var(--gray);margin-top:.2rem}
.cart-item-qty{display:flex;align-items:center;gap:.5rem;margin-top:.6rem}
.cart-item-price{font-size:1.1rem;font-weight:800;color:var(--a);flex-shrink:0}
.cart-del{background:none;border:none;color:var(--gray);font-size:1.1rem;margin-left:.5rem}
.cart-del:hover{color:var(--red)}
.summary-box{background:var(--w);border-radius:var(--r);padding:1.5rem;box-shadow:var(--shadow)}
.summary-box h3{font-size:1.1rem;font-weight:700;color:var(--p);margin-bottom:1.2rem}
.summary-row{display:flex;justify-content:space-between;font-size:.9rem;margin-bottom:.65rem;color:var(--gray)}
.summary-row.total{font-weight:800;color:var(--dark);font-size:1.1rem;margin-top:1rem;padding-top:1rem;border-top:2px solid var(--sand)}
.coupon-row{display:flex;gap:.4rem;margin:.8rem 0}
.coupon-row input{flex:1;padding:.5rem .8rem;border:1.5px solid var(--sand);border-radius:6px;font-size:.85rem}
.coupon-ok{color:var(--green);font-size:.8rem;margin-top:.3rem}
.secure-note{text-align:center;font-size:.75rem;color:var(--gray);margin-top:1rem}
.checkout-layout{display:grid;grid-template-columns:1fr 360px;gap:2rem;align-items:start}
.checkout-form{background:var(--w);border-radius:var(--r);padding:2rem;box-shadow:var(--shadow)}
.checkout-steps{display:flex;gap:1.5rem;font-size:.82rem;margin-bottom:1.5rem;flex-wrap:wrap}
.step-item{display:flex;align-items:center;gap:.4rem;color:var(--gray)}
.step-item.active{color:var(--a);font-weight:700}
.step-item.done{color:var(--green)}
.step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;background:var(--sand);color:var(--gray)}
.step-item.active .step-num{background:var(--a);color:#fff}
.step-item.done .step-num{background:var(--green);color:#fff}
.form-section{margin-bottom:2rem}
.form-section h3{font-size:1rem;font-weight:700;color:var(--p);margin-bottom:1.2rem;display:flex;align-items:center;gap:.6rem}
.pay-option{display:flex;align-items:center;gap:.8rem;padding:.9rem 1rem;border:1.5px solid var(--sand);border-radius:var(--r);cursor:pointer;margin-bottom:.6rem;transition:all .2s}
.pay-option:hover{border-color:var(--a)}
.pay-option.selected{border-color:var(--a);background:#fff8f4}
.pay-icon{font-size:1.3rem}
.pay-label{font-size:.9rem;font-weight:600;color:var(--dark)}
.pay-desc{font-size:.75rem;color:var(--gray)}
.card-field{border:1.5px solid var(--sand);border-radius:var(--r);padding:.7rem .9rem;font-size:.9rem;min-height:44px}
.demo-card-info{background:var(--lg);border-radius:var(--r);padding:1rem;margin-top:.8rem;font-size:.82rem;color:var(--gray)}
.demo-card-info strong{color:var(--dark);display:block;margin-bottom:.4rem}
.success-wrap{text-align:center;padding:4rem 2rem;max-width:600px;margin:0 auto}
.success-icon{font-size:5rem;margin-bottom:1rem}
.success-wrap h2{color:var(--p);font-size:2rem;margin-bottom:.5rem}
.success-wrap p{color:var(--gray);margin-bottom:1.5rem}
.order-detail-box{background:var(--w);border-radius:var(--r);padding:1.5rem;box-shadow:var(--shadow);text-align:left;margin:1.5rem 0}
.order-item-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--sand);font-size:.88rem;color:var(--gray)}
.order-item-row:last-child{border:none}
.account-layout{display:grid;grid-template-columns:220px 1fr;gap:2rem;align-items:start}
.account-sidebar{background:var(--w);border-radius:var(--r);padding:1.4rem;box-shadow:var(--shadow);position:sticky;top:80px}
.user-avatar-circle{width:72px;height:72px;background:var(--a);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto .8rem}
.acc-name{font-weight:700;text-align:center}
.acc-email{font-size:.78rem;color:var(--gray);text-align:center;margin-bottom:1.2rem}
.acc-menu a{display:flex;align-items:center;gap:.6rem;padding:.65rem .5rem;color:var(--gray);font-size:.88rem;border-radius:6px;transition:all .2s;cursor:pointer}
.acc-menu a:hover,.acc-menu a.active{color:var(--a);background:var(--lg)}
.acc-content{background:var(--w);border-radius:var(--r);padding:2rem;box-shadow:var(--shadow)}
.acc-content h2{font-size:1.2rem;font-weight:700;color:var(--p);margin-bottom:1.5rem}
.tbl{width:100%;border-collapse:collapse;font-size:.86rem}
.tbl th{text-align:left;padding:.65rem 1rem;background:var(--lg);color:var(--dark);font-weight:700}
.tbl td{padding:.65rem 1rem;border-bottom:1px solid var(--sand);color:var(--gray)}
.tbl tr:last-child td{border:none}
.tbl tbody tr:hover{background:var(--lg)}
.badge{display:inline-block;padding:.2rem .65rem;border-radius:20px;font-size:.73rem;font-weight:700}
.badge-green{background:#e8f5e8;color:var(--green)}
.badge-orange{background:#fff3e0;color:#e65100}
.badge-red{background:#ffeaea;color:var(--red)}
.badge-blue{background:#e3f0ff;color:var(--blue)}
.badge-gray{background:var(--sand);color:var(--gray)}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem}
.contact-card{background:var(--p);border-radius:var(--r);padding:2rem;color:#fff}
.contact-card h3{font-size:1.3rem;font-weight:800;margin-bottom:1.5rem}
.contact-item{display:flex;align-items:flex-start;gap:.8rem;margin-bottom:1.2rem;font-size:.88rem;line-height:1.5}
.contact-item .ci-icon{font-size:1.3rem;flex-shrink:0}
.map-box{background:var(--sand);border-radius:12px;height:180px;display:flex;align-items:center;justify-content:center;font-size:3rem;margin-top:1.2rem}
.social-row{display:flex;gap:.7rem;margin-top:1.2rem}
.soc-btn{background:rgba(255,255,255,.14);width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;cursor:pointer;transition:background .2s}
.soc-btn:hover{background:rgba(255,255,255,.28)}
.admin-wrap{display:grid;grid-template-columns:215px 1fr;min-height:calc(100vh - 68px)}
.admin-sidebar{background:var(--p);color:rgba(255,255,255,.8);padding:1.5rem 0}
.admin-sidebar .admin-logo{padding:0 1.2rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.1);margin-bottom:.8rem;font-size:.78rem;color:var(--g);font-weight:700}
.admin-menu a{display:flex;align-items:center;gap:.7rem;padding:.7rem 1.5rem;font-size:.87rem;color:rgba(255,255,255,.7);cursor:pointer;transition:all .2s;border-right:3px solid transparent}
.admin-menu a:hover,.admin-menu a.active{color:#fff;background:rgba(255,255,255,.08);border-right-color:var(--g)}
.admin-main{background:#FAF5EE;padding:2rem;overflow-y:auto}
.admin-main h1{font-size:1.5rem;font-weight:800;color:var(--p);margin-bottom:1.5rem}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--w);border-radius:var(--r);padding:1.3rem;box-shadow:var(--shadow)}
.stat-icon{font-size:1.8rem;margin-bottom:.5rem}
.stat-val{font-size:1.7rem;font-weight:800;color:var(--p)}
.stat-label{font-size:.78rem;color:var(--gray);margin-top:.15rem}
.stat-trend{font-size:.75rem;color:var(--green);margin-top:.3rem;font-weight:600}

function handleRoute(method,seg,params,body){
  const uid=S.token?parseInt(S.token):null;
  const users=DB.get('users',[]);
  const currentUser=uid?users.find(u=>u.id===uid):null;
  if(seg[0]==='auth'){
    if(seg[1]==='me'&&method==='GET'){
      if(!currentUser)throw new Error('No autorizado');
      return safeUser(currentUser);
    }
    if(seg[1]==='login'&&method==='POST'){
      const{email,password}=body;
      const u=users.find(u=>u.email&&u.email.toLowerCase()===email?.toLowerCase());
      if(!u||u.password_hash!==hashStr(password))throw new Error('Email o contraseña incorrectos');
      return{token:String(u.id),user:safeUser(u)};
    }
    if(seg[1]==='register'&&method==='POST'){
      const{name,email,password,phone}=body;
      if(!name||!email||!password)throw new Error('Campos requeridos');
      if(users.find(u=>u.email&&u.email.toLowerCase()===email.toLowerCase()))throw new Error('El correo ya está registrado');
      const nu={id:nextId(users),name,email:email.toLowerCase(),password_hash:hashStr(password),role:'customer',phone:phone||'',created_at:new Date().toISOString()};
      users.push(nu);DB.set('users',users);
      return{token:String(nu.id),user:safeUser(nu)};
    }
    if(seg[1]==='profile'&&method==='PUT'){
      if(!currentUser)throw new Error('No autorizado');
      const idx=users.findIndex(u=>u.id===currentUser.id);
      if(body.name)users[idx].name=body.name;
      if(body.phone!==undefined)users[idx].phone=body.phone;
      DB.set('users',users);return safeUser(users[idx]);
    }
    if(seg[1]==='password'&&method==='PUT'){
      if(!currentUser)throw new Error('No autorizado');
      const idx=users.findIndex(u=>u.id===currentUser.id);
      if(users[idx].password_hash!==hashStr(body.current))throw new Error('Contraseña actual incorrecta');
      users[idx].password_hash=hashStr(body.newPassword);
      DB.set('users',users);return{ok:true};
    }
  }
  if(seg[0]==='products'){
    const products=DB.get('products',[]);
    if(seg[1]==='categories'&&method==='GET'){
      const cats={};
      products.forEach(p=>{if(!cats[p.category])cats[p.category]=[];if(p.subcategory&&!cats[p.category].includes(p.subcategory))cats[p.category].push(p.subcategory)});
      return cats;
    }
    if(!seg[1]&&method==='GET'){
      let list=[...products];
      const search=params.get('search'),category=params.get('category'),subcategory=params.get('subcategory');
      const minPrice=params.get('minPrice'),maxPrice=params.get('maxPrice'),featured=params.get('featured');
      const sort=params.get('sort')||'id',limit=parseInt(params.get('limit')||'24');
      if(search){const q=search.toLowerCase();list=list.filter(p=>p.name.toLowerCase().includes(q)||p.description?.toLowerCase().includes(q)||p.category.toLowerCase().includes(q))}
      if(category)list=list.filter(p=>p.category===category);
      if(subcategory)list=list.filter(p=>p.subcategory===subcategory);
      if(minPrice)list=list.filter(p=>p.price>=parseFloat(minPrice));
      if(maxPrice)list=list.filter(p=>p.price<=parseFloat(maxPrice));
      if(featured==='1')list=list.filter(p=>p.featured);
      const reviews=DB.get('reviews',[]);
      list=list.map(p=>{const pr=reviews.filter(r=>r.product_id===p.id);const avg=pr.length?pr.reduce((s,r)=>s+r.rating,0)/pr.length:0;return{...p,avg_rating:Math.round(avg*10)/10,review_count:pr.length}});
      if(sort==='price_asc')list.sort((a,b)=>a.price-b.price);
      else if(sort==='price_desc')list.sort((a,b)=>b.price-a.price);
      else if(sort==='newest')list.sort((a,b)=>b.id-a.id);
      return{products:list.slice(0,limit),total:list.length};
    }
    if(seg[1]&&seg[2]==='reviews'&&method==='POST'){
      if(!currentUser)throw new Error('No autorizado');
      const pid=parseInt(seg[1]);
      const reviews=DB.get('reviews',[]);
      if(reviews.find(r=>r.product_id===pid&&r.user_id===currentUser.id))throw new Error('Ya dejaste una reseña para este producto');
      const nr={id:nextId(reviews),product_id:pid,user_id:currentUser.id,rating:body.rating,comment:body.comment||'',created_at:new Date().toISOString()};
      reviews.push(nr);DB.set('reviews',reviews);return nr;
    }
    if(seg[1]&&!seg[2]&&method==='GET'){
      const p=products.find(p=>p.id===parseInt(seg[1]));
      if(!p)throw new Error('Producto no encontrado');
      const reviews=DB.get('reviews',[]);
      const us=DB.get('users',[]);
      const pr=reviews.filter(r=>r.product_id===p.id).map(r=>({...r,user_name:us.find(u=>u.id===r.user_id)?.name||'Usuario'}));
      const avg=pr.length?pr.reduce((s,r)=>s+r.rating,0)/pr.length:0;
      return{...p,avg_rating:Math.round(avg*10)/10,review_count:pr.length,reviews:pr};
    }
    if(!seg[1]&&method==='POST'){
      if(!currentUser||currentUser.role!=='admin')throw new Error('No autorizado');
      const np={id:nextId(products),...body,created_at:new Date().toISOString()};
      products.push(np);DB.set('products',products);return np;
    }
    if(seg[1]&&!seg[2]&&method==='PUT'){
      if(!currentUser||currentUser.role!=='admin')throw new Error('No autorizado');
      const idx=products.findIndex(p=>p.id===parseInt(seg[1]));
      if(idx===-1)throw new Error('Producto no encontrado');
      products[idx]={...products[idx],...body};DB.set('products',products);return products[idx];
    }
    if(seg[1]&&!seg[2]&&method==='DELETE'){
      if(!currentUser||currentUser.role!=='admin')throw new Error('No autorizado');
      const idx=products.findIndex(p=>p.id===parseInt(seg[1]));
      if(idx===-1)throw new Error('Producto no encontrado');
      products.splice(idx,1);DB.set('products',products);return{ok:true};
    }
  }
  if(seg[0]==='cart'){
    if(!currentUser)throw new Error('No autorizado');
    const cart=DB.get('cart',[]);
    const products=DB.get('products',[]);
    const userCart=()=>{
      const items=cart.filter(c=>c.user_id===currentUser.id).map(c=>{const p=products.find(p=>p.id===c.product_id);return p?{...p,...c,product_id:c.product_id,quantity:c.quantity}:null}).filter(Boolean);
      return{items,subtotal:items.reduce((s,i)=>s+i.price*i.quantity,0),count:items.reduce((s,i)=>s+i.quantity,0)};
    };
    if(!seg[1]&&method==='GET')return userCart();
    if(!seg[1]&&method==='POST'){
      const{product_id,quantity}=body;const p=products.find(p=>p.id===product_id);
      if(!p)throw new Error('Producto no encontrado');
      const ei=cart.findIndex(c=>c.user_id===currentUser.id&&c.product_id===product_id);
      const qty=Math.max(1,Math.min(p.stock,(ei>=0?cart[ei].quantity:0)+(quantity||1)));
      if(ei>=0)cart[ei].quantity=qty;else cart.push({id:nextId(cart),user_id:currentUser.id,product_id,quantity:qty,created_at:new Date().toISOString()});
      DB.set('cart',cart);return userCart();
    }
    if(seg[1]&&method==='PUT'){
      const pid=parseInt(seg[1]),qty=parseInt(body.quantity);
      if(qty<=0){const i=cart.findIndex(c=>c.user_id===currentUser.id&&c.product_id===pid);if(i>=0)cart.splice(i,1)}
      else{const p=products.find(p=>p.id===pid);const mx=p?p.stock:99;const i=cart.findIndex(c=>c.user_id===currentUser.id&&c.product_id===pid);if(i>=0)cart[i].quantity=Math.min(qty,mx)}
      DB.set('cart',cart);return userCart();
    }
    if(seg[1]&&method==='DELETE'){
      const i=cart.findIndex(c=>c.user_id===currentUser.id&&c.product_id===parseInt(seg[1]));
      if(i>=0)cart.splice(i,1);DB.set('cart',cart);return userCart();
    }
    if(!seg[1]&&method==='DELETE'){
      DB.set('cart',cart.filter(c=>c.user_id!==currentUser.id));
      return{items:[],subtotal:0,count:0};
    }
  }
  if(seg[0]==='wishlist'){
    if(!currentUser)throw new Error('No autorizado');
    const wl=DB.get('wishlist',[]);const products=DB.get('products',[]);
    if(!seg[1]&&method==='GET')return wl.filter(w=>w.user_id===currentUser.id).map(w=>products.find(p=>p.id===w.product_id)).filter(Boolean);
    if(seg[1]&&method==='POST'){
      const pid=parseInt(seg[1]);const i=wl.findIndex(w=>w.user_id===currentUser.id&&w.product_id===pid);
      if(i>=0)wl.splice(i,1);else wl.push({id:nextId(wl),user_id:currentUser.id,product_id:pid,created_at:new Date().toISOString()});
      DB.set('wishlist',wl);return{ok:true};
    }
  }
  if(seg[0]==='addresses'){
    if(!currentUser)throw new Error('No autorizado');
    const addrs=DB.get('addresses',[]);
    if(method==='GET')return addrs.filter(a=>a.user_id===currentUser.id);
    if(method==='POST'){
      const{alias,name,street,city,state,zip,is_default}=body;
      if(!street||!city||!state||!zip)throw new Error('Campos de dirección requeridos');
      if(is_default)addrs.forEach(a=>{if(a.user_id===currentUser.id)a.is_default=0});
      const na={id:nextId(addrs),user_id:currentUser.id,alias:alias||'Casa',name:name||currentUser.name,street,city,state,zip,country:'México',is_default:is_default?1:0};
      addrs.push(na);DB.set('addresses',addrs);return na;
    }
    if(seg[1]&&method==='DELETE'){
      const i=addrs.findIndex(a=>a.id===parseInt(seg[1])&&a.user_id===currentUser.id);
      if(i>=0)addrs.splice(i,1);DB.set('addresses',addrs);return{ok:true};
    }
  }
  if(seg[0]==='coupons'&&seg[1]==='validate'&&method==='POST'){
    const coupons=DB.get('coupons',[]);const code=body.code?.toUpperCase();const subtotal=body.subtotal||0;
    const c=coupons.find(c=>c.code===code&&c.active);
    if(!c)throw new Error('Cupón no válido');
    if(c.expires_at&&new Date(c.expires_at)<new Date())throw new Error('Cupón expirado');
    if(subtotal<c.min_purchase)throw new Error(`Compra mínima: ${fmt(c.min_purchase)}`);
    if(c.used_count>=c.max_uses)throw new Error('Cupón agotado');
    const discount=c.discount_type==='percent'?subtotal*(c.discount_value/100):c.discount_value;
    return{discount:Math.round(discount),coupon:c};
  }
  if(seg[0]==='checkout'){
    if(!currentUser)throw new Error('No autorizado');
    if(seg[1]==='intent'&&method==='POST')return{demo:true,client_secret:`demo_${Date.now()}`};
    if(seg[1]==='complete'&&method==='POST'){
      const cart=DB.get('cart',[]);const products=DB.get('products',[]);
      const orders=DB.get('orders',[]);const ois=DB.get('order_items',[]);
      const coupons=DB.get('coupons',[]);
      const items=cart.filter(c=>c.user_id===currentUser.id).map(c=>{const p=products.find(p=>p.id===c.product_id);return p?{...p,...c,product_id:c.product_id,quantity:c.quantity}:null}).filter(Boolean);
      if(!items.length)throw new Error('El carrito está vacío');
      const subtotal=items.reduce((s,i)=>s+i.price*i.quantity,0);
      const sh=subtotal>=5000?0:299;
      let disc=0;
      if(body.coupon_code){const cp=coupons.find(c=>c.code===body.coupon_code.toUpperCase()&&c.active);if(cp){disc=cp.discount_type==='percent'?subtotal*(cp.discount_value/100):cp.discount_value;const ci=coupons.findIndex(c=>c.code===body.coupon_code.toUpperCase());if(ci>=0)coupons[ci].used_count++;DB.set('coupons',coupons)}}
      const total=subtotal+sh-disc;
      const tracking='CM'+Date.now().toString().slice(-8);
      const{shipping,payment_method,payment_intent_id}=body;
      const no={id:nextId(orders),user_id:currentUser.id,status:'confirmado',subtotal,shipping:sh,discount:disc,total,shipping_name:shipping.name,shipping_street:shipping.street,shipping_city:shipping.city,shipping_state:shipping.state,shipping_zip:shipping.zip,shipping_phone:shipping.phone,payment_method:payment_method||'tarjeta',payment_intent_id:payment_intent_id||'',tracking_number:tracking,created_at:new Date().toISOString(),updated_at:new Date().toISOString()};
      orders.push(no);DB.set('orders',orders);
      const ni=items.map(i=>({id:nextId(ois),order_id:no.id,product_id:i.product_id,name:i.name,price:i.price,quantity:i.quantity,emoji:i.image_emoji}));
      ois.push(...ni);DB.set('order_items',ois);
      DB.set('cart',cart.filter(c=>c.user_id!==currentUser.id));
      items.forEach(i=>{const idx=products.findIndex(p=>p.id===i.product_id);if(idx>=0)products[idx].stock=Math.max(0,products[idx].stock-i.quantity)});
      DB.set('products',products);
      return{order:{...no,items:ni}};
    }
  }
  if(seg[0]==='orders'){
    if(!currentUser)throw new Error('No autorizado');
    const orders=DB.get('orders',[]);const ois=DB.get('order_items',[]);
    if(!seg[1]&&method==='GET')return orders.filter(o=>o.user_id===currentUser.id).map(o=>({...o,item_count:ois.filter(i=>i.order_id===o.id).reduce((s,i)=>s+i.quantity,0)})).sort((a,b)=>b.id-a.id);
    if(seg[1]&&method==='GET'){
      const o=orders.find(o=>o.id===parseInt(seg[1])&&o.user_id===currentUser.id);
      if(!o)throw new Error('Pedido no encontrado');
      return{...o,items:ois.filter(i=>i.order_id===o.id)};
    }
  }
  if(seg[0]==='admin'){
    if(!currentUser||currentUser.role!=='admin')throw new Error('No autorizado');
    const users=DB.get('users',[]);const orders=DB.get('orders',[]);const ois=DB.get('order_items',[]);const products=DB.get('products',[]);
    if(seg[1]==='stats'&&method==='GET'){
      const sm={};ois.forEach(i=>{if(!sm[i.product_id])sm[i.product_id]={qty:0,rev:0};sm[i.product_id].qty+=i.quantity;sm[i.product_id].rev+=i.price*i.quantity});
      const top=products.filter(p=>sm[p.id]).map(p=>({...p,total_sold:sm[p.id].qty,revenue:sm[p.id].rev})).sort((a,b)=>b.total_sold-a.total_sold).slice(0,5);
      return{totalSales:orders.reduce((s,o)=>s+o.total,0),totalOrders:orders.length,pendingOrders:orders.filter(o=>o.status==='pendiente').length,totalUsers:users.filter(u=>u.role!=='admin').length,totalProducts:products.length,lowStock:products.filter(p=>p.stock<5).length,recentOrders:orders.slice(-5).reverse().map(o=>({...o,user_name:users.find(u=>u.id===o.user_id)?.name||'Cliente'})),topProducts:top};
    }
    if(seg[1]==='orders'&&!seg[2]&&method==='GET')return orders.map(o=>({...o,user_name:users.find(u=>u.id===o.user_id)?.name||'Cliente',email:users.find(u=>u.id===o.user_id)?.email||''})).sort((a,b)=>b.id-a.id);
    if(seg[1]==='orders'&&seg[2]&&method==='PUT'){
      const idx=orders.findIndex(o=>o.id===parseInt(seg[2]));
      if(idx===-1)throw new Error('Pedido no encontrado');
      if(body.status)orders[idx].status=body.status;
      if(body.tracking_number!==undefined)orders[idx].tracking_number=body.tracking_number;
      orders[idx].updated_at=new Date().toISOString();DB.set('orders',orders);return orders[idx];
    }
    if(seg[1]==='users'&&method==='GET')return users.filter(u=>u.role!=='admin').map(u=>({...u,order_count:orders.filter(o=>o.user_id===u.id).length,total_spent:orders.filter(o=>o.user_id===u.id).reduce((s,o)=>s+o.total,0)}));
    if(seg[1]==='products'&&method==='GET')return products;
  }
  throw new Error('Ruta no encontrada');
}
function localRoute(method,path,body){
  const[po,qs]=path.split('?');
  const params=new URLSearchParams(qs||'');
  const seg=po.split('/').filter(Boolean);
  return new Promise((res,rej)=>{
    setTimeout(()=>{try{res(handleRoute(method,seg,params,body))}catch(e){rej(e)}},30);
  });
}

function buildCatalogHash(p){
  const parts=[];
  if(p.search)parts.push(`search=${encodeURIComponent(p.search)}`);
  if(p.category)parts.push(`category=${encodeURIComponent(p.category)}`);
  if(p.subcategory)parts.push(`subcategory=${encodeURIComponent(p.subcategory)}`);
  if(p.minPrice)parts.push(`minPrice=${p.minPrice}`);
  if(p.maxPrice)parts.push(`maxPrice=${p.maxPrice}`);
  if(p.sort&&p.sort!=='id')parts.push(`sort=${p.sort}`);
  location.hash='#catalog'+(parts.length?'?'+parts.join('&'):'');
}
window.filterCat=(cat,sub)=>buildCatalogHash({category:cat,subcategory:sub});
window.changeSort=(sort)=>{const p=parseHash();p.params.sort=sort;buildCatalogHash(p.params)};
window.applyPriceFilter=()=>{
  const p=parseHash();
  p.params.minPrice=document.getElementById('min-price')?.value||'';
  p.params.maxPrice=document.getElementById('max-price')?.value||'';
  buildCatalogHash(p.params);
};

};

window.doLogin=async(next)=>{

  try{
    const res=await api.post('/auth/login',{email,password:pass});

    await loadCart();renderHeader();toast(`✅ Bienvenido, ${res.user.name}!`,'success');

window.doRegister=async()=>{
  const name=document.getElementById('r-name')?.value?.trim(),email=document.getElementById('r-email')?.value?.trim();
  const phone=document.getElementById('r-phone')?.value?.trim(),pass=document.getElementById('r-pass')?.value,pass2=document.getElementById('r-pass2')?.value;
  const err=document.getElementById('reg-error'),btn=document.getElementById('reg-btn');
  if(!name||!email||!pass){err.textContent='Nombre, email y contraseña son requeridos.';return}
  if(pass!==pass2){err.textContent='Las contraseñas no coinciden.';return}
  if(pass.length<6){err.textContent='La contraseña debe tener al menos 6 caracteres.';return}
  btn.disabled=true;btn.textContent='⏳ Creando cuenta…';
  try{
    const res=await api.post('/auth/register',{name,email,password:pass,phone});
    S.token=res.token;S.user=res.user;localStorage.setItem('cm_token',res.token);
    renderHeader();toast(`✅ Cuenta creada. ¡Bienvenido, ${name}!`,'success');location.hash='#home';
  }catch(e){err.textContent=e.message;btn.disabled=false;btn.textContent='Crear cuenta'}
};

window.sendContact=async()=>{
  const name=document.getElementById('c-name')?.value?.trim(),email=document.getElementById('c-email')?.value?.trim(),msg=document.getElementById('c-msg')?.value?.trim();
  if(!name||!email||!msg)return toast('Completa todos los campos requeridos','error');
  await new Promise(r=>setTimeout(r,800));
  toast('✅ Mensaje enviado. Te respondemos en menos de 24 horas.','success');
  document.getElementById('c-msg').value='';
};
async function renderWishlistPage(){
  if(!S.user){location.hash='#login';return}
  await loadWishlist();
  setMain(`<div class="section"><div class="container"><div class="breadcrumb">Inicio › <span>Lista de Deseos</span></div><h2 class="section-title">Mi Lista de Deseos</h2>${S.wishlist.length===0?`<div class="empty-state"><div class="emoji">❤️</div><h3>Lista vacía</h3><p>Guarda aquí los productos que te gustan para comprarlos después.</p><a href="#catalog" class="btn btn-primary">Explorar catálogo</a></div>`:`<div class="grid-4">${S.wishlist.map(p=>productCard(p)).join('')}</div>`}</div></div>`);
}
function renderStaticPage(title,content){
  setMain(`<div class="section"><div class="container" style="max-width:800px"><div class="breadcrumb">Inicio › <span>${title}</span></div><h2 class="section-title">${title}</h2><div style="color:var(--gray);line-height:1.8;font-size:.92rem;margin-top:1.5rem">${content}</div></div></div>`);
}
window.addToCart=async(productId,name,qty=1)=>{
  if(!S.user){toast('Inicia sesión para agregar al carrito','error');setTimeout(()=>location.hash='#login',800);return}
  try{const res=await api.post('/cart',{product_id:productId,quantity:qty});S.cart=res;renderHeader();toast(`✅ "${name}" agregado al carrito`)}
  catch(e){toast(e.message,'error')}
};
window.toggleWishlist=async(productId)=>{
  if(!S.user){toast('Inicia sesión para guardar favoritos','error');return}
  try{
    await api.post(`/wishlist/${productId}`);await loadWishlist();
    const inWish=S.wishlist.some(w=>w.id===productId);
    const btn=document.getElementById('wish-btn');
    if(btn)btn.textContent=inWish?'❤️ En favoritos':'🤍 Agregar a favoritos';
    toast(inWish?'❤️ Agregado a favoritos':'Eliminado de favoritos');
  }catch(e){toast(e.message,'error')}
};
async function loadCart(){if(!S.user){S.cart={items:[],subtotal:0,count:0};return}try{S.cart=await api.get('/cart')}catch{S.cart={items:[],subtotal:0,count:0}}}
async function loadWishlist(){if(!S.user){S.wishlist=[];return}try{S.wishlist=await api.get('/wishlist')}catch{S.wishlist=[]}}
window.logout=()=>{S.token=null;S.user=null;S.cart={items:[],subtotal:0,count:0};S.wishlist=[];localStorage.removeItem('cm_token');renderHeader();toast('👋 Sesión cerrada');location.hash='#home'};
function parseHash(){
  const raw=location.hash.slice(1)||'home';
  const[pathPart,queryPart]=raw.split('?');
  const segments=pathPart.split('/');
  const page=segments[0],id=segments[1];
  const params={};
  if(queryPart)queryPart.split('&').forEach(pair=>{const[k,v]=pair.split('=');params[decodeURIComponent(k)]=decodeURIComponent(v||'')});
  return{page,id,params};
}
async function route(){
  const{page,id,params}=parseHash();
  document.querySelectorAll('.nav-links a').forEach(a=>{const href=(a.getAttribute('href')||'').replace('#','');a.classList.toggle('active',href===page)});
  try{
    switch(page){
      case'home':await renderHome();break;
      case'nosotros':renderNosotros();break;
      case'catalog':await renderCatalog(params);break;
      case'product':await renderProduct(id);break;
      case'cart':await renderCart();break;
      case'checkout':await renderCheckout();break;
      case'order-success':await renderOrderSuccess(id);break;
      case'login':renderLogin(params.next||'');break;
      case'register':renderRegister();break;
      case'account':await renderAccount(id||'orders');break;
      case'wishlist':await renderWishlistPage();break;
      case'admin':await renderAdmin(id||'dashboard');break;
      case'contact':case'faq':renderContact();break;
      case'terms':renderStaticPage('Términos y Condiciones','<p>Los presentes términos y condiciones regulan el uso del sitio web y los servicios de CAOBA MX. Al realizar una compra en nuestra plataforma, usted acepta estos términos en su totalidad.</p><p style="margin-top:1rem">© 2026 CAOBA MX. Todos los derechos reservados.</p>');break;
      case'privacy':renderStaticPage('Política de Privacidad','<p>En CAOBA MX respetamos tu privacidad. Los datos personales que recopilamos son utilizados únicamente para procesar tus pedidos y mejorar tu experiencia de compra. No compartimos tu información con terceros sin tu consentimiento.</p>');break;
      case'returns':renderStaticPage('Política de Devoluciones','<p>Aceptamos devoluciones dentro de los 30 días posteriores a la compra si el producto tiene defecto de fabricación o llegó dañado. El producto debe estar en condiciones originales.</p>');break;
      case'shipping':renderStaticPage('Información de Envíos','<p>Realizamos envíos a toda la república mexicana. El tiempo de entrega es de 3 a 7 días hábiles. Para la CDMX y área metropolitana puede ser de 1 a 3 días hábiles. Envío gratuito en compras superiores a $5,000 MXN.</p>');break;
      default:await renderHome();
    }
  }catch(e){console.error(e);setMain(`<div class="empty-state"><div class="emoji">😕</div><h3>Algo salió mal</h3><p>${e.message}</p><a href="#home" class="btn btn-primary">Volver al inicio</a></div>`)}
}
async function init(){
  if(S.token){try{S.user=await api.get('/auth/me')}catch{S.token=null;localStorage.removeItem('cm_token')}}
  renderHeader();renderFooter();
  if(S.user)await loadCart();
  window.addEventListener('hashchange',route);
  await route();
}
